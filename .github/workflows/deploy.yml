name: Deploy to Cloudflare Workers

# Build and deploy on every push to main. Manual runs are also allowed.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys; a newer push cancels an in-flight one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Secrets cannot be referenced directly in step-level `if:` conditionals,
    # so expose the key as a job-level env var and test that instead.
    env:
      GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        # Version is read from the "packageManager" field in package.json.
        # Do not set it here too, or pnpm errors with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      # Now that pnpm is installed, configure node to cache its store
      - name: Configure Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Refresh translations only when an API key is configured. Locale files
      # are committed and act as the cache, so builds still work without it;
      # this step just fetches any new/edited English strings. Already-cached
      # strings bill zero characters.
      - name: Sync translations
        if: ${{ env.GOOGLE_TRANSLATE_API_KEY != '' }}
        run: pnpm run translate

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # dist is built in the previous step; just deploy it.
          command: deploy
