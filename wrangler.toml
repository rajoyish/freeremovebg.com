name = "freeremovebg"
compatibility_date = "2025-06-01"
main = "./worker/index.js"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "freeremovebg.com", custom_domain = true },
]

[assets]
directory = "./dist"
binding = "ASSETS"

not_found_handling = "404-page"

run_worker_first = ["/", "/api/count"]

# Global cutout counter (production). Shares one database with staging.
[[d1_databases]]
binding = "DB"
database_name = "freeremovebg_stats"
database_id = "c87ac39c-e41a-4232-b166-d5639c62442a"

[env.staging]
name = "freeremovebg-staging"
workers_dev = false
routes = [
  { pattern = "staging.freeremovebg.com", custom_domain = true }
]
run_worker_first = true

[env.staging.vars]
ENVIRONMENT = "staging"

# Named environments do NOT inherit d1_databases — re-declare the same binding.
[[env.staging.d1_databases]]
binding = "DB"
database_name = "freeremovebg_stats"
database_id = "c87ac39c-e41a-4232-b166-d5639c62442a"